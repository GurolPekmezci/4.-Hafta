<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; 
            background-color: #0f172a; 
            color: white; 
            font-family: sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #glow {
            position: fixed; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 1;
        }
        .main-box { position: relative; z-index: 10; text-align: center; padding: 20px; }
        h1 { font-size: 3rem; margin: 0; color: #38bdf8; text-transform: uppercase; }
        .btn {
            margin-top: 20px; padding: 15px 30px; 
            background: #38bdf8; color: #0f172a; 
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .dashboard { display: none; margin-top: 30px; gap: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid #38bdf8; width: 350px; }
        img { width: 100%; border-radius: 5px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="glow"></div>

<div class="main-box">
    <h1>GÜROL PEKMEZCİ</h1>
    <p>Data Science & Automation</p>
    <button class="btn" onclick="show()">VERİLERİ GÖRÜNTÜLE</button>

    <div id="db" class="dashboard">
        <div class="card">
            <h3>Grafik Analizi</h3>
            <canvas id="myChart"></canvas>
        </div>
        <div class="card">
            <h3>Görselleştirme (PNG)</h3>
            <img src="analiz_grafikleri.png" onerror="this.src='https://via.placeholder.com/300x200?text=PNG+Bulunamadi'" />
        </div>
    </div>
</div>

<script>
    // Fare Takip
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    function show() {
        document.getElementById('db').style.display = 'flex';
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A', 'B', 'C', 'D'],
                datasets: [{ label: 'Veri Özeti', data: [10, 25, 15, 30], backgroundColor: '#38bdf8' }]
            }
        });
    }
</script>

</body>
</html>
