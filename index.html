<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --bg-dark: #0f0c29;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            overflow: hidden; /* Şekillerin taşmaması için */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* --- HAREKETLİ GEOMETRİK ARKAPLAN --- */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: move 20s infinite linear;
        }

        .shape:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 10%; border-radius: 20%; }
        .shape:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 80%; border-radius: 50%; animation-duration: 25s; }
        .shape:nth-child(3) { width: 80px; height: 80px; top: 40%; left: 50%; transform: rotate(45deg); animation-duration: 15s; }
        .shape:nth-child(4) { width: 120px; height: 120px; top: 80%; left: 20%; border-radius: 30%; animation-delay: -5s; }

        @keyframes move {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 100px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* --- KONTEYNER VE KARTLAR --- */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 4px;
            color: #ccc;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .card strong {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .card span {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Veri Seti Kartı Vurgusu */
        .data-card strong { color: var(--secondary); }

        footer {
            margin-top: 50px;
            font-size: 0.7rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <h1>GÜROL PEKMEZCİ</h1>
        <p class="subtitle">Data & Software Developer</p>

        <div class="links-grid">
            <a href="labirent.html" class="card">
                <strong>🎮 LABİRENT OYUNU</strong>
                <span>Uygulamayı Başlat</span>
            </a>

            <a href="./veri.csv" class="card data-card" download>
                <strong>📊 VERİ SETİ (CSV)</strong>
                <span>Dosyayı İndir / İncele</span>
            </a>

            <a href="analiz_grafikleri.png" class="card" target="_blank">
                <strong>📈 ANALİZLER</strong>
                <span>Grafikleri Görüntüle</span>
            </a>

            <a href="https://github.com/GurolPekmezci" class="card" target="_blank">
                <strong>📂 GITHUB</strong>
                <span>Tüm Kod Arşivi</span>
            </a>
        </div>

        <footer>
            PROJE DASHBOARD © 2026
        </footer>
    </div>

</body>
</html>
