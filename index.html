<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Data Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #020617; --glass: rgba(15, 23, 42, 0.85); }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; /* Girişte kaydırmayı kapatıyoruz */
        }

        /* Arka Plan Hareketli Geometri */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        /* Sayfa Kapsayıcı (Kaydırma Efekti İçin) */
        .page-wrapper {
            transition: transform 1s cubic-bezier(0.86, 0, 0.07, 1);
            height: 200vh;
        }

        section { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }

        /* --- SAYFA 1: GİRİŞ (HERO) --- */
        .hero h1 { 
            font-size: clamp(3rem, 10vw, 6rem); 
            font-weight: 900; 
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { opacity: 0.5; letter-spacing: 8px; margin-bottom: 40px; text-transform: uppercase; }

        .btn-execute {
            padding: 20px 60px; background: transparent; color: var(--neon);
            border: 1px solid var(--neon); border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: 0.4s; font-size: 1rem; letter-spacing: 2px;
        }
        .btn-execute:hover { background: var(--neon); color: var(--bg); box-shadow: 0 0 50px rgba(0, 242, 255, 0.4); }

        /* --- SAYFA 2: DASHBOARD --- */
        .dashboard { 
            background: #010409; 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            grid-template-rows: auto 1fr auto;
            gap: 20px; 
            padding: 40px;
            overflow-y: auto;
        }

        .card { 
            background: var(--glass); 
            border: 1px solid rgba(0, 242, 255, 0.1); 
            border-radius: 8px; 
            padding: 20px; 
            backdrop-filter: blur(10px);
        }

        .card-header { 
            font-size: 0.7rem; color: var(--neon); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 10px; margin-bottom: 15px; font-weight: bold;
        }

        /* Veri Tablosu (CSV Görünümü) */
        .csv-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #94a3b8; }
        .csv-table th { color: var(--neon); text-align: left; padding: 5px; }
        .csv-table td { padding: 5px; border-bottom: 1px solid #1e293b; }

        /* Analiz Görseli (PNG) */
        .main-analysis-img { 
            width: 100%; 
            height: auto; 
            border-radius: 4px; 
            border: 1px solid rgba(0,242,255,0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: 0.5s;
        }
        .main-analysis-img:hover { border-color: var(--neon); transform: scale(1.01); }

        /* Sayfa Geçiş Tetikleyici */
        .active-dashboard { transform: translateY(-100vh); }

        @media (max-width: 1024px) { .card { grid-column: span 12 !important; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="page-wrapper" id="wrapper">
        
        <section class="hero">
            <p>Project Terminal v2.0</p>
            <h1>GÜROL PEKMEZCİ</h1>
            <button class="btn-execute" onclick="showDashboard()">DASHBOARD'U GÖRÜNTÜLE</button>
        </section>

        <section class="dashboard">
            <div style="grid-column: span 12; display:flex; justify-content: space-between;">
                <h2 style="font-size: 1.2rem; color: var(--neon);">SYSTEM_ANALYSIS_DASHBOARD</h2>
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">[ EXIT ]</button>
            </div>

            <div class="card" style="grid-column: span 4;">
                <div class="card-header">RAW_DATA_STREAM (data.csv)</div>
                <table class="csv-table">
                    <thead><tr><th>INDEX</th><th>VAL_A</th><th>VAL_B</th><th>STATUS</th></tr></thead>
                    <tbody id="csvRows"></tbody>
                </table>
            </div>

            <div class="card" style="grid-column: span 8;">
                <div class="card-header">ALGORITHMIC_PERFORMANCE (K-Means / Regression)</div>
                <canvas id="liveChart" height="120"></canvas>
            </div>

            <div class="card" style="grid-column: span 12;">
                <div class="card-header">VISUAL_DATA_OUTPUT (analiz_grafikleri.png)</div>
                <div style="display: flex; gap: 20px; align-items: start;">
                    <img src="analiz_grafikleri.png" class="main-analysis-img" alt="Veri Analiz Grafiği" 
                         onerror="this.src='https://via.placeholder.com/1200x500/020617/00f2ff?text=analiz_grafikleri.png+Bulunamadi'">
                    <div style="min-width: 250px; font-size: 0.9rem; opacity: 0.7;">
                        <h4 style="color:var(--neon)">Analiz Özeti:</h4>
                        <p>• K-Means Clustering<br>• Regresyon Modeli<br>• Outlier Tespiti</p>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // 1. Arka Plan Hareketli Noktalar
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let points = [];
        for(let i=0; i<80; i++) points.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00f2ff";
            points.forEach(p => {
                p.y -= 0.5; if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. Dashboard'u Başlat
        function showDashboard() {
            document.getElementById('wrapper').classList.add('active-dashboard');
            document.body.style.overflowY = "auto";

            // Tabloyu Simüle Et
            const tbody = document.getElementById('csvRows');
            for(let i=1; i<=10; i++) {
                tbody.innerHTML += `<tr><td>#${100+i}</td><td>${(Math.random()*10).toFixed(2)}</td><td>${(Math.random()*100).toFixed(1)}</td><td style="color:#4ade80;">OK</td></tr>`;
            }

            // Grafiği Çiz
            const chartCtx = document.getElementById('liveChart').getContext('2d');
            new Chart(chartCtx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Veri İşleme Skoru',
                        data: [65, 78, 90, 85, 95, 99],
                        borderColor: '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { 
                    plugins: { legend: { labels: { color: 'white' } } },
                    scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } }
                }
            });
        }

        window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });
    </script>
</body>
</html>
