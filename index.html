<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --bg-dark: #0f0c29;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            overflow: hidden; /* Şekillerin taşmaması için */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* --- HAREKETLİ GEOMETRİK ARKAPLAN --- */
        #bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: move infinite linear;
        }

        @keyframes move {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* --- ANA KONTEYNER --- */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.1);
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 3px;
            color: #bdc3c7;
            margin-bottom: 35px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* --- LİNKLER GRİD --- */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .card strong {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .card span {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Veri Seti Kartı İçin Yeşil Tema */
        .data-card:hover { border-color: var(--secondary); }
        .data-card strong { color: var(--secondary); }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="bg-shapes"></div>

    <div class="container">
        <img src="resimler.jpeg" alt="Profil Fotoğrafı" class="profile-img">
        
        <h1>GÜROL PEKMEZCİ</h1>
        <p class="subtitle">Data & Software Developer</p>

        <div class="links-grid">
            <a href="labirent.html" class="card">
                <strong>🎮 LABİRENT OYUNU</strong>
                <span>Uygulamayı Başlat</span>
            </a>

            <a href="veri.csv" class="card data-card" download>
                <strong>📊 VERİ SETİ (CSV)</strong>
                <span>Dosyayı İndir / İncele</span>
            </a>

            <a href="analiz_grafikleri.png" class="card" target="_blank">
                <strong>📈 GRAFİKLER</strong>
                <span>Analiz Çıktılarını Gör</span>
            </a>

            <a href="https://github.com/GurolPekmezci/4.-Hafta" class="card" target="_blank">
                <strong>📂 GITHUB REPO</strong>
                <span>Kaynak Kodları İncele</span>
            </a>
        </div>

        <footer>
            PROJE DASHBOARD © 2026 | Gürol Pekmezci
        </footer>
    </div>

    <script>
        // Rastgele geometrik şekiller oluşturan script
        const bg = document.getElementById('bg-shapes');
        const count = 15;

        for (let i = 0; i < count; i++) {
            const shape = document.createElement('div');
            shape.classList.add('shape');
            
            const size = Math.random() * 80 + 20;
            shape.style.width = `${size}px`;
            shape.style.height = `${size}px`;
            
            // Rastgele kare veya daire
            if (Math.random() > 0.5) shape.style.borderRadius = '50%';
            
            shape.style.left = `${Math.random() * 100}%`;
            
            // Rastgele hız ve gecikme
            const duration = Math.random() * 10 + 10;
            const delay = Math.random() * 5;
            shape.style.animationDuration = `${duration}s`;
            shape.style.animationDelay = `${delay}s`;
            
            bg.appendChild(shape);
        }
    </script>
</body>
</html>
