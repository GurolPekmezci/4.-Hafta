<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Data Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.95); 
            --border: rgba(0, 242, 255, 0.2);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        .wrapper {
            display: flex;
            flex-direction: column;
            transition: transform 1s cubic-bezier(0.86, 0, 0.07, 1);
            height: 200vh;
        }

        section { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

        /* --- PROFİL ALANI --- */
        .profile-wrap {
            width: 140px; height: 140px;
            margin-bottom: 20px;
            position: relative;
        }
        .profile-pic {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid var(--neon);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .hero h1 { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            font-weight: 900; 
            background: linear-gradient(to bottom, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .btn-access {
            padding: 15px 40px; background: transparent; color: var(--neon);
            border: 2px solid var(--neon); cursor: pointer;
            transition: 0.3s; font-weight: bold; letter-spacing: 2px;
        }
        .btn-access:hover { background: var(--neon); color: var(--bg); box-shadow: 0 0 40px var(--neon); }

        /* --- DASHBOARD --- */
        .dashboard { 
            background: #010409; 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; padding: 40px;
            overflow-y: auto
