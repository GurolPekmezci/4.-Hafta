<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Analytics Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--deep-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Arka Plan Hareketli Geometri */
        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Yükleme Ekranı (Preloader) */
        #loader {
            position: fixed; width: 100%; height: 100%; background: var(--deep-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1s ease;
        }
        .loader-bar { width: 200px; height: 2px; background: #1e293b; position: relative; margin-top: 20px; }
        .loader-fill { position: absolute; height: 100%; background: var(--neon-blue); width: 0%; animation: load 2s forwards; }
        @keyframes load { to { width: 100%; } }

        /* Ana Ekran (Hero) */
        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        
        .hero-content { text-align: center; opacity: 0; transform: translateY(30px); animation: fadeInUp 1s 2.2s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 30%, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        .typing-text { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); letter-spacing: 4px; font-size: 1.2rem; margin-bottom: 40px; }

        /* Buton Tasarımı */
        .cyber-btn {
            padding: 20px 60px;
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            overflow: hidden;
        }
        .cyber-btn:hover {
            background: var(--neon-blue);
            color: var(--deep-dark);
            box-shadow: 0 0 50px var(--neon-blue);
        }

        /* Dashboard Alanı */
        #dashboard {
            width: 100%;
            max-width: 1300px;
            display: none; /* Butona basınca açılacak */
            grid-template-columns: repeat(12, 1fr);
            gap: 25px;
            margin-top: 50px
