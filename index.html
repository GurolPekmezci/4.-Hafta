<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a; color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Arka Plan Hareketli Noktalar */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Işık Efekti */
        #glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            transform: translate(-50%, -50%);
        }

        .hero { text-align: center; margin-top: 100px; z-index: 10; }
        h1 { font-size: 4rem; margin-bottom: 10px; color: #38bdf8; }
        p { opacity: 0.6; letter-spacing: 2px; }

        .btn-show {
            margin-top: 30px; padding: 15px 40px;
            background: #38bdf8; color: #0f172a;
            border: none; border-radius: 50px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }

        .btn-show:hover { transform: scale(1.05); box-shadow: 0 0 20px #38bdf8; }

        /* Dashboard Alanı - Başlangıçta Kapalı */
        #dashboard {
            display: none; width: 90%; max-width: 1000px;
            margin: 50px 0; gap: 20px; z-index: 10;
        }

        .card {
            flex: 1; background: rgba(30, 41, 59, 0.8);
            border: 1px solid #38bdf8; border-radius: 15px;
            padding: 20px; backdrop-filter: blur(5px);
            min-width: 300px;
        }

        img { width: 100%; border-radius: 10px; border: 1px solid #334155; margin-top: 15px; }

        @media (max-width: 768px) { #dashboard { flex-direction: column; } }
    </style>
</head>
<body>

    <div id="glow"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="hero">
        <h1>GÜROL PEKMEZCİ</h1>
        <p>VERİ ANALİZİ VE YAZILIM PROJELERİ</p>
        <button class="btn-show" onclick="startData()">VERİLERİ VE GRAFİKLERİ GÖR</button>
    </div>

    <div id="dashboard">
        <div class="card">
            <h3>Performans Analizi (CSV Verisi)</h3>
            <canvas id="myChart"></canvas>
        </div>

        <div class="card">
            <h3>Görselleştirme Çıktısı (PNG)</h3>
            <img src="analiz_grafikleri.png" alt="Analiz Grafiği" onerror="this.src='https://via.placeholder.com/400x300?text=Görsel+Yüklenemedi'">
        </div>
    </div>

    <script>
        // 1. Işık Takibi
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // 2. Hareketli Arka Plan
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.v = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.v;
                if(this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = "rgba(56, 189, 248, 0.4)";
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.2, 0, Math.PI*2); ctx.fill();
            }
        }

        for(let i=0; i<100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update();
