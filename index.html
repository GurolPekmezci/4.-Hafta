<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Data Engine Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --bg-dark: #0f0c29;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* --- HAREKETLİ ARKA PLAN --- */
        #bg-shapes {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, #0f0c29, #24243e);
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* --- ANA KONTEYNER --- */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            max-width: 900px;
            width: 95%;
            text-align: center;
            z-index: 10;
            margin: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle { color: #aaa; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 30px; }

        /* BUTONLAR */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        /* VERİ TABLOSU */
        #data-display {
            display: none;
            margin-top: 25px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .table-wrapper {
            max-height: 350px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: var(--primary); color: #000; padding: 12px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        footer { margin-top: 30px; opacity: 0.3; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="bg-shapes"></div>

<div class="container">
    <img src="resimler.jpeg" alt="Gürol Pekmezci" class="profile-img">
    
    <h1>GÜROL PEKMEZCİ</h1>
    <p class="subtitle">DATA ENGINE DASHBOARD</p>

    <div class="links-grid">
        <a href="labirent.html" class="card">🎮 OYUN</a>
        
        <div class="card" onclick="toggleData()">📊 VERİLERİ GÖR</div>
        
        <a href="analiz_grafikleri.png" target="_blank" class="card">📈 GRAFİKLER</a>
        
        <a href="https://github.com/GurolPekmezci/4.-Hafta" target="_blank" class="card">📂 GITHUB</a>
    </div>

    <div id="data-display">
        <h3 style="color: var(--secondary); margin-bottom: 10px;">Veri Seti Önizleme (data.csv)</h3>
        <div class="table-wrapper" id="csv-table">
            <p style="padding: 20px; text-align: center; color: #888;">Yükleniyor...</p>
        </div>
    </div>

    <footer>PROJE DASHBOARD © 2026 | Gürol Pekmezci</footer>
</div>

<script>
    // ARKA PLAN ŞEKİLLERİNİ OLUŞTUR
    const bg = document.getElementById('bg-shapes');
    for (let i = 0; i < 20; i++) {
        const shape = document.createElement('div');
        shape.classList.add('shape');
        const size = Math.random() * 70 + 20;
        shape.style.width = size + 'px';
        shape.style.height = size + 'px';
        if (Math.random() > 0.5) shape.style.borderRadius = '50%';
        shape.style.left = Math.random() * 100 + '%';
        shape.style.animationDuration = (Math.random() * 10 + 10) + 's';
        shape.style.animationDelay = '-' + (Math.random() * 10) + 's';
        bg.appendChild(shape);
    }

    // 404 HATASINI ÖNLEYEN VE VERİLERİ ÇEKEN FONKSİYON
    function toggleData() {
        const display = document.getElementById('data-display');
        const tableDiv = document.getElementById('csv-table');
        
        if (display.style.display === 'block') {
            display.style.display = 'none';
        } else {
            display.style.display = 'block';
            
            // Dosya adını klasöründeki 'data.csv' ile eşitledim
            fetch('data.csv')
            .then(response => {
                if (!response.ok) throw new Error("Dosya bulunamadı");
                return response.text();
            })
            .then(data => {
                const rows = data.split('\n').filter(r => r.trim() !== "");
                let html = '<table><thead><tr>';
                
                // Başlıklar
                const headers = rows[0].split(',');
                headers.forEach(h => html += `<th>${h}</th>`);
                html += '</tr></thead><tbody>';

                // İlk 30 satırı göster
                for (let i = 1; i < Math.min(rows.length, 31); i++) {
                    html += '<tr>';
                    rows[i].split(',').forEach(c => html += `<td>${c}</td>`);
                    html += '</tr>';
                }
                html += '</tbody></table>';
                tableDiv.innerHTML = html;
            })
            .catch(err => {
                tableDiv.innerHTML = `<p style="padding:20px; color:#ff4d4d; text-align:center;">Hata: data.csv dosyasına ulaşılamadı. Lütfen GitHub klasöründe dosya adının tam olarak 'data.csv' olduğundan emin olun.</p>`;
            });
        }
    }
</script>

</body>
</html>
