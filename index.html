<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Data Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --bg-dark: #0f0c29;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* --- ARKAPLAN ANİMASYONU --- */
        #bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: linear-gradient(135deg, #0f0c29, #24243e); }
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* --- KONTEYNER --- */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            max-width: 900px;
            width: 95%;
            text-align: center;
            z-index: 10;
            margin: 20px 0;
        }

        .profile-img {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            margin-bottom: 15px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-5px); border-color: var(--primary); }

        /* --- VERİ TABLOSU VE GRAFİKLER --- */
        #data-display {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        .table-wrapper {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--primary); color: #000; padding: 10px; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .chart-img {
            width: 100%;
            border-radius: 15px;
            border: 1px solid var(--secondary);
            margin-top: 15px;
        }

        h2 { color: var(--secondary); margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="bg-shapes"></div>

<div class="container">
    <img src="resimler.jpeg" alt="Gürol Pekmezci" class="profile-img">
    <h1>GÜROL PEKMEZCİ</h1>
    <p style="letter-spacing: 2px; color: #aaa; margin-bottom: 25px; font-size: 0.8rem;">DATA ENGINE DASHBOARD</p>

    <div class="links-grid">
        <a href="labirent.html" class="card"><strong>🎮 OYUN</strong></a>
        <div class="card" onclick="toggleData()"><strong>📊 VERİLERİ GÖR</strong></div>
        <a href="https://github.com/GurolPekmezci" target="_blank" class="card"><strong>📂 GITHUB</strong></a>
    </div>

    <div id="data-display">
        <h2>Veri Seti Önizleme (veri.csv)</h2>
        <div class="table-wrapper" id="csv-table">
            <p style="padding: 20px; text-align: center;">Veriler yükleniyor...</p>
        </div>

        <h2>Analiz Grafikleri</h2>
        <img src="analiz_grafikleri.png" alt="Grafikler" class="chart-img">
    </div>

    <footer style="margin-top: 30px; opacity: 0.3; font-size: 0.7rem;">© 2026 Gürol Pekmezci</footer>
</div>

<script>
    // Arkaplan Şekilleri
    const bg = document.getElementById('bg-shapes');
    for (let i = 0; i < 15; i++) {
        const shape = document.createElement('div');
        shape.classList.add('shape');
        const size = Math.random() * 60 + 20;
        shape.style.width = `${size}px`;
        shape.style.height = `${size}px`;
        if (Math.random() > 0.5) shape.style.borderRadius = '50%';
        shape.style.left = `${Math.random() * 100}%`;
        shape.style.animationDuration = `${Math.random() * 12 + 8}s`;
        shape.style.animationDelay = `-${Math.random() * 10}s`;
        bg.appendChild(shape);
    }

    // CSV Okuma ve Tabloya Dönüştürme
    function toggleData() {
        const display = document.getElementById('data-display');
        if (display.style.display === 'block') {
            display.style.display = 'none';
        } else {
            display.style.display = 'block';
            fetch('veri.csv')
                .then(response => response.text())
                .then(data => {
                    const rows = data.split('\n').filter(row => row.trim() !== '');
                    let tableHtml = '<table><thead><tr>';
                    
                    // Başlıklar
                    const headers = rows[0].split(',');
                    headers.forEach(h => tableHtml += `<th>${h}</th>`);
                    tableHtml += '</tr></thead><tbody>';

                    // Veriler (İlk 50 satır performans için)
                    for (let i = 1; i < Math.min(rows.length, 51); i++) {
                        tableHtml += '<tr>';
                        const cols = rows[i].split(',');
                        cols.forEach(c => tableHtml += `<td>${c}</td>`);
                        tableHtml += '</tr>';
                    }
                    tableHtml += '</tbody></table>';
                    document.getElementById('csv-table').innerHTML = tableHtml;
                })
                .catch(err => {
                    document.getElementById('csv-table').innerHTML = '<p style="color:red">Veri yüklenemedi. (veri.csv bulunamadı)</p>';
                });
        }
    }
</script>

</body>
</html>
