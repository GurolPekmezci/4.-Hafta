<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --bg-dark: #0f0c29;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* --- HAREKETLİ GEOMETRİK ARKAPLAN --- */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: move infinite linear;
            pointer-events: none;
        }

        @keyframes move {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-1000px) rotate(360deg); opacity: 0; }
        }

        /* --- ANA KONTEYNER --- */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-weight: 300;
            letter-spacing: 3px;
            color: #bdc3c7;
            margin-bottom: 35px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .card strong {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .card span {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Veri Seti Kartı */
        .data-card:hover { border-color: var(--secondary); }
        .data-card strong { color: var(--secondary); }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="container">
        <img src="resimler.jpeg" alt="Gürol Pekmezci" class="profile-img">
        
        <h1>GÜROL PEKMEZCİ</h1>
        <p class="subtitle">Data Engine & Software Developer</p>

        <div class="links-grid">
            <a href="labirent.html" class="card">
                <strong>🎮 LABİRENT OYUNU</strong>
                <span>Projeyi Çalıştır</span>
            </a>

            <a href="https://raw.githubusercontent.com/GurolPekmezci/4.-Hafta/main/veri.csv" class="card data-card" target="_blank">
                <strong>📊 VERİ SETİ (CSV)</strong>
                <span>Dosyayı İncele</span>
            </a>

            <a href="analiz_grafikleri.png" class="card" target="_blank">
                <strong>📈 ANALİZLER</strong>
                <span>Grafikleri Gör</span>
            </a>

            <a href="https://github.com/GurolPekmezci" class="card" target="_blank">
                <strong>📂 GITHUB</strong>
                <span>Kod Arşivi</span>
            </a>
        </div>

        <footer>
            DASHBOARD PORTFOLIO © 2026
        </footer>
    </div>

    <script>
        // Arkaplanda rastgele geometrik şekiller oluşturan script
        const canvas = document.getElementById('bg-canvas');
        const shapeCount = 15;

        for (let i = 0; i < shapeCount; i++) {
            const shape = document.createElement('div');
            shape.classList.add('shape');
            
            // Rastgele boyut ve tip (yuvarlak veya kare)
            const size = Math.random() * 80 + 20;
            shape.style.width = `${size}px`;
            shape.style.height = `${size}px`;
            if (Math.random() > 0.5) shape.style.borderRadius = '50%';
            
            // Rastgele pozisyon
            shape.style.left = `${Math.random() * 100}%`;
            shape.style.top = `${Math.random() * 100 + 100}%`;
            
            // Rastgele hız ve gecikme
            shape.style.animationDuration = `${Math.random() * 10 + 10}s`;
            shape.style.animationDelay = `${Math.random() * 5}s`;
            
            canvas.appendChild(shape);
        }
    </script>
</body>
</html>
