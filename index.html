<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #00d2ff;
            margin-bottom: 20px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#00d2ff, #92fe9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-10px);
            border-color: #00d2ff;
        }

        .card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card span {
            font-weight: 600;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="resimler.jpeg" alt="Profil Fotoğrafı" class="profile-img">
    
    <h1>Gürol Pekmezci</h1>
    <p class="subtitle">Data Engine & Yazılım Geliştirme</p>

    <div class="links-grid">
        <a href="labirent.html" class="card">
            <span>🎮 Maze Game</span>
            <small>Uygulamayı Başlat</small>
        </a>

        <a href="veri.csv" class="card" target="_blank">
            <span>📊 Veri Seti (CSV)</span>
            <small>Dataset'i İncele</small>
        </a>

        <a href="analiz_grafikleri.png" class="card" target="_blank">
            <span>📈 Analiz Grafikleri</span>
            <small>Görselleştirme</small>
        </a>

        <a href="https://github.com/GurolPekmezci" class="card" target="_blank">
            <span>📂 GitHub</span>
            <small>Diğer Projeler</small>
        </a>
    </div>

    <footer>
        © 2026 Gürol Pekmezci | Tüm Hakları Saklıdır.
    </footer>
</div>

</body>
</html>
