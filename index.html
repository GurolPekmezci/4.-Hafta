<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Data Engine v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.95); 
            --border: rgba(0, 242, 255, 0.2);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; /* Girişte kaydırmayı kapatıyoruz */
        }

        /* Arka Plan Hareketli Geometri */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        /* Sayfa Kapsayıcı (Kaydırma Efekti İçin) */
        .wrapper {
            display: flex;
            flex-direction: column;
            transition: transform 1s cubic-bezier(0.86, 0, 0.07, 1);
            height: 200vh;
        }

        section { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

        /* --- SAYFA 1: GİRİŞ (HERO) --- */
        .hero { text-align: center; }
        .hero h1 { 
            font-size: clamp(3rem, 10vw, 5rem); 
            font-weight: 900; 
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .hero p { opacity: 0.5; letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase; font-size: 0.8rem;}

        .btn-access {
            padding: 18px 50px; background: transparent; color: var(--neon);
            border: 2px solid var(--neon); border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: 0.4s; font-size: 1.1rem; letter-spacing: 2px;
        }
        .btn-access:hover { background: var(--neon); color: var(--bg); box-shadow: 0 0 50px rgba(0, 242, 255, 0.4); transform: translateY(-3px); }

        /* --- SAYFA 2: DASHBOARD --- */
        .dashboard { 
            background: #010409; 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            padding: 40px;
            overflow-y: auto;
            align-content: start;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 20px; 
            backdrop-filter: blur(10px);
            position: relative;
        }
        .card:hover { border-color: rgba(0, 242, 255, 0.5); }

        .card-header { 
            font-size: 0.7rem; color: var(--neon); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px;
        }

        /* Veri Tablosu (CSV Görünümü) */
        .csv-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #94a3b8; }
        .csv-table th { color: var(--neon); text-align: left; padding: 5px; border-bottom: 1px solid #1e293b;}
        .csv-table td { padding: 5px; border-bottom: 1px solid #0f172a; }

        /* Senin Analiz Görselin (PNG) */
        .main-analysis-img { 
            width: 100%; 
            height: auto; 
            border-radius: 4px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s;
        }
        .main-analysis-img:hover { border-color: var(--neon); transform: scale(1.01); }

        /* Sayfa Geçiş Tetikleyici */
        .show-data { transform: translateY(-100vh); }

        @media (max-width: 1024px) { .card { grid-column: span 12 !important; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="wrapper" id="mainWrapper">
        
        <section class="hero">
            <p>> SYSTEM STATUS: ONLINE</p>
            <h1>GÜROL PEKMEZCİ</h1>
            <button class="btn-access" onclick="launchSystem()">EXECUTE DATA_SCAN</button>
        </section>

        <section class="dashboard">
            <div style="grid-column: span 12; display:flex; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid #1e293b; margin-bottom: 10px;">
                <h2 style="font-size: 1rem; color: var(--neon); font-weight: bold;">[ DATABASE ACCESS GRANTED ]</h2>
