<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gürol Pekmezci | Data Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Fare Takip Efekti (Spotlight) */
        .cursor-follower {
            fixed: position;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle 150px at var(--x, 0) var(--y, 0), rgba(56, 189, 248, 0.15), transparent 80%);
            z-index: 1;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.4; }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section { margin-bottom: 60px; }

        /* Grafik ve Görsel Alanı */
        .display-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .btn-main {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            margin-bottom: 40px;
        }

        img { width: 100%; border-radius: 10px; margin-top: 10px; }
        
        .hidden { display: none; }
        canvas#myChart { max-height: 300px; }
    </style>
</head>
<body>

    <div class="cursor-follower" id="follower"></div>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header-section">
            <h1>Gürol Pekmezci</h1>
            <p style="opacity: 0.7; letter-spacing: 1px;">VERİ ANALİZİ & SİSTEM OPTİMİZASYONU</p>
        </div>

        <button class="btn-main" onclick="revealAnalysis()">ANALİZİ BAŞLAT VE GRAFİKLERİ
